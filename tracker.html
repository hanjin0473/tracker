<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>캐릭터 작업 트래커 (최종 수정판)</title>
    <style>
        :root { --primary: #1a73e8; --bg: #f0f2f5; --white: #ffffff; }
        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; background-color: var(--bg); color: #333; margin: 0; }
        .container { max-width: 100%; margin: 0 auto; background: var(--white); padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e8f0fe; padding-bottom: 15px; margin-bottom: 20px; }
        h2 { margin: 0; color: var(--primary); }

        .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; background: #f8f9fa; padding: 15px; border-radius: 8px; align-items: center; }
        button { padding: 8px 14px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: bold; transition: 0.2s; }
        .btn-add { background: var(--primary); color: white; }
        .btn-add:hover { background: #1557b0; }
        .btn-reset { background: #ea4335; color: white; margin-left: auto; }

        .summary { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; background: #e8f0fe; padding: 12px 20px; border-radius: 8px; flex-grow: 1; max-width: 500px; }
        .progress-bar { flex-grow: 1; height: 10px; background: #dae0e5; border-radius: 5px; overflow: hidden; }
        .progress-fill { height: 100%; background: #34a853; width: 0%; transition: 0.3s; }

        .table-wrapper { overflow: auto; border: 1px solid #eee; border-radius: 8px; max-height: 75vh; }
        table { border-collapse: collapse; width: 100%; table-layout: fixed; }
        th, td { border: 1px solid #eee; padding: 12px 8px; text-align: center; min-width: 130px; position: relative; }
        th { background: #f8f9fa; position: sticky; top: 0; z-index: 10; border-bottom: 2px solid #ddd; }
        
        .sticky-col { position: sticky; left: 0; background: #fffde7 !important; z-index: 11; font-weight: bold; width: 140px; }
        .desc-col { width: 180px; text-align: left; font-size: 11px; color: #666; background: #fafafa !important; position: sticky; left: 140px; z-index: 11; }

        .input-edit { width: 90%; border: 1px solid transparent; background: transparent; text-align: center; padding: 6px; border-radius: 4px; font-weight: inherit; font-size: inherit; }
        .input-edit:hover { border-color: #ccc; background: #fff; }
        .input-edit:focus { border-color: var(--primary); background: #fff; outline: none; }
        
        .del-btn { position: absolute; top: 2px; right: 2px; font-size: 12px; color: #ccc; cursor: pointer; border: none; background: none; opacity: 0; transition: 0.2s; }
        th:hover .del-btn, td:hover .del-btn { opacity: 1; }
        .del-btn:hover { color: #ff4d4f; }

        .tag-display { font-size: 10px; color: #888; display: block; background: #f1f3f4; padding: 4px; border-radius: 4px; margin-top: 6px; font-family: monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        input[type="checkbox"] { cursor: pointer; width: 20px; height: 20px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2>🎨 작업 트래커</h2>
        <div class="summary">
            <span style="font-size: 14px; font-weight: bold; white-space: nowrap;"><span id="percentText">0%</span></span>
            <div class="progress-bar"><div class="progress-fill" id="progressBar"></div></div>
            <span style="font-size: 12px; color: #666; white-space: nowrap;">(<span id="doneCount">0</span>/<span id="totalCount">0</span>)</span>
        </div>
    </header>

    <div class="controls">
        <button class="btn-add" onclick="addColumn()">+ 캐릭터 추가</button>
        <button class="btn-add" onclick="addRow()">+ 키워드 추가</button>
        <button class="btn-reset" onclick="resetAll()">초기화</button>
    </div>

    <div class="table-wrapper">
        <table>
            <thead><tr id="headerRow"></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    const STORAGE_KEY = 'omni_tracker_v5_final';
    
    // 초기 상태
    let state = {
        chars: [
            { id: Date.now() + 1, name: 'el' },
            { id: Date.now() + 2, name: 'rin' }
        ],
        keywords: [
            { id: Date.now() + 10, name: 'basic', desc: '기본 상태' },
            { id: Date.now() + 11, name: 'happy', desc: '웃음' }
        ],
        checks: {} // 키: "kwId-charId"
    };

    function init() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) state = JSON.parse(saved);
        render();
    }

    function save() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        updateProgress();
    }

    function render() {
        const headerRow = document.getElementById('headerRow');
        const tableBody = document.getElementById('tableBody');

        // 헤더
        headerRow.innerHTML = '<th class="sticky-col">키워드</th><th class="desc-col">설명</th>';
        state.chars.forEach(char => {
            const th = document.createElement('th');
            th.innerHTML = `
                <input class="input-edit" value="${char.name}" onchange="editChar(${char.id}, this.value)">
                <button class="del-btn" onclick="removeColumn(${char.id})">✖</button>
            `;
            headerRow.appendChild(th);
        });

        // 본문
        tableBody.innerHTML = '';
        state.keywords.forEach(kw => {
            const tr = document.createElement('tr');
            let rowHtml = `
                <td class="sticky-col">
                    <input class="input-edit" value="${kw.name}" onchange="editKw(${kw.id}, 'name', this.value)">
                    <button class="del-btn" onclick="removeRow(${kw.id})">✖</button>
                </td>
                <td class="desc-col">
                    <input class="input-edit" style="text-align:left;" value="${kw.desc}" onchange="editKw(${kw.id}, 'desc', this.value)">
                </td>
            `;

            state.chars.forEach(char => {
                const checkId = `${kw.id}-${char.id}`;
                const isChecked = state.checks[checkId] ? 'checked' : '';
                const tag = `${char.name}${kw.name}`;
                
                rowHtml += `
                    <td>
                        <input type="checkbox" ${isChecked} onchange="toggleCheck('${checkId}', this.checked)">
                        <span class="tag-display">${tag}</span>
                    </td>`;
            });
            tr.innerHTML = rowHtml;
            tableBody.appendChild(tr);
        });
        updateProgress();
    }

    function editChar(id, val) {
        const char = state.chars.find(c => c.id === id);
        if (char) char.name = val.trim();
        save(); render();
    }

    function editKw(id, field, val) {
        const kw = state.keywords.find(k => k.id === id);
        if (kw) kw[field] = val.trim();
        save(); render();
    }

    function toggleCheck(id, val) {
        state.checks[id] = val;
        save();
    }

    function addColumn() {
        state.chars.push({ id: Date.now(), name: 'new' });
        save(); render();
    }

    function addRow() {
        state.keywords.push({ id: Date.now(), name: 'new', desc: '설명' });
        save(); render();
    }
    
    function removeColumn(id) {
        if(confirm('삭제할까요?')) {
            state.chars = state.chars.filter(c => c.id !== id);
            save(); render();
        }
    }

    function removeRow(id) {
        if(confirm('삭제할까요?')) {
            state.keywords = state.keywords.filter(k => k.id !== id);
            save(); render();
        }
    }

    function updateProgress() {
        const total = state.chars.length * state.keywords.length;
        const checked = Object.entries(state.checks).filter(([key, val]) => {
            // 현재 존재하는 행/열의 체크만 계산
            const [kwId, charId] = key.split('-').map(Number);
            return val === true && 
                   state.keywords.some(k => k.id === kwId) && 
                   state.chars.some(c => c.id === charId);
        }).length;

        const percent = total > 0 ? Math.round((checked / total) * 100) : 0;
        document.getElementById('progressBar').style.width = percent + '%';
        document.getElementById('percentText').innerText = percent + '%';
        document.getElementById('doneCount').innerText = checked;
        document.getElementById('totalCount').innerText = total;
    }

    function resetAll() {
        if(confirm('모든 데이터를 초기화할까요?')) {
            localStorage.removeItem(STORAGE_KEY);
            location.reload();
        }
    }

    init();
</script>
</body>
</html>
