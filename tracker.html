<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>커스텀 캐릭터 트래커</title>
    <style>
        :root { --primary: #1a73e8; --bg: #f0f2f5; --white: #ffffff; }
        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; background-color: var(--bg); color: #333; margin: 0; }
        .container { max-width: 100%; margin: 0 auto; background: var(--white); padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e8f0fe; padding-bottom: 15px; margin-bottom: 20px; }
        h2 { margin: 0; color: var(--primary); }

        /* 제어 버튼 영역 */
        .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; background: #f8f9fa; padding: 15px; border-radius: 8px; }
        button { padding: 8px 14px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: bold; transition: 0.2s; }
        .btn-add { background: var(--primary); color: white; }
        .btn-add:hover { background: #1557b0; }
        .btn-reset { background: #ea4335; color: white; margin-left: auto; }

        /* 요약 바 */
        .summary { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; background: #e8f0fe; padding: 12px 20px; border-radius: 8px; }
        .progress-bar { flex-grow: 1; height: 10px; background: #dae0e5; border-radius: 5px; overflow: hidden; }
        .progress-fill { height: 100%; background: #34a853; width: 0%; transition: 0.3s; }

        /* 테이블 스타일 */
        .table-wrapper { overflow-x: auto; border: 1px solid #eee; border-radius: 8px; max-height: 70vh; }
        table { border-collapse: collapse; width: 100%; table-layout: fixed; }
        th, td { border: 1px solid #eee; padding: 10px; text-align: center; min-width: 100px; position: relative; }
        th { background: #f8f9fa; position: sticky; top: 0; z-index: 10; }
        
        .sticky-col { position: sticky; left: 0; background: #fffde7; z-index: 5; font-weight: bold; min-width: 120px; }
        .desc-col { min-width: 150px; text-align: left; font-size: 11px; color: #666; }

        /* 입력 및 삭제 */
        .input-edit { width: 90%; border: 1px transparent; background: transparent; text-align: center; padding: 4px; border-radius: 3px; }
        .input-edit:hover { border-color: #ddd; background: #fff; }
        .input-edit:focus { border-color: var(--primary); background: #fff; outline: none; }
        
        .del-btn { position: absolute; top: 2px; right: 2px; font-size: 10px; color: #ccc; cursor: pointer; border: none; background: none; display: none; }
        th:hover .del-btn, td:hover .del-btn { display: block; }
        .del-btn:hover { color: #ff4d4f; }

        .tag-display { font-size: 10px; color: #888; display: block; background: #f1f3f4; padding: 2px; border-radius: 3px; margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        input[type="checkbox"] { cursor: pointer; transform: scale(1.2); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2>🎨 작업 매니저</h2>
        <div class="summary">
            <span style="font-size: 14px; font-weight: bold; white-space: nowrap;">전체 진행도: <span id="percentText">0%</span></span>
            <div class="progress-bar"><div class="progress-fill" id="progressBar"></div></div>
        </div>
    </header>

    <div class="controls">
        <button class="btn-add" onclick="addColumn()">+ 캐릭터 추가</button>
        <button class="btn-add" onclick="addRow()">+ 키워드 추가</button>
        <button class="btn-reset" onclick="resetAll()">데이터 초기화</button>
    </div>

    <div class="table-wrapper">
        <table id="mainTable">
            <thead>
                <tr id="headerRow">
                    <th class="sticky-col" style="background:#eee">키워드</th>
                    <th class="desc-col" style="background:#eee">설명</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    const STORAGE_KEY = 'omni_tracker_v3';
    
    // 초기 기본 데이터
    let state = {
        chars: ['캐릭1', '캐릭2'],
        keywords: [
            { name: 'basic', desc: '기본 상태' },
            { name: 'happy', desc: '웃음' }
        ],
        checks: {}
    };

    function init() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) state = JSON.parse(saved);
        render();
    }

    function save() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        updateProgress();
    }

    function render() {
        const headerRow = document.getElementById('headerRow');
        const tableBody = document.getElementById('tableBody');

        // 헤더 초기화 (키워드, 설명 제외)
        headerRow.innerHTML = '<th class="sticky-col">키워드</th><th class="desc-col">설명</th>';
        state.chars.forEach((name, idx) => {
            const th = document.createElement('th');
            th.innerHTML = `
                <input class="input-edit" value="${name}" onchange="editChar(${idx}, this.value)">
                <button class="del-btn" onclick="removeColumn(${idx})">✖</button>
            `;
            headerRow.appendChild(th);
        });

        // 본문 초기화
        tableBody.innerHTML = '';
        state.keywords.forEach((kw, kwIdx) => {
            const tr = document.createElement('tr');
            
            // 키워드명 & 설명
            tr.innerHTML = `
                <td class="sticky-col">
                    <input class="input-edit" value="${kw.name}" onchange="editKw(${kwIdx}, 'name', this.value)">
                    <button class="del-btn" onclick="removeRow(${kwIdx})">✖</button>
                </td>
                <td class="desc-col">
                    <input class="input-edit" style="text-align:left; font-size:11px" value="${kw.desc}" onchange="editKw(${kwIdx}, 'desc', this.value)">
                </td>
            `;

            // 각 캐릭터별 체크박스
            state.chars.forEach((charName, charIdx) => {
                const td = document.createElement('td');
                const checkId = `${kwIdx}-${charIdx}`;
                const isChecked = state.checks[checkId] ? 'checked' : '';
                td.innerHTML = `
                    <input type="checkbox" ${isChecked} onchange="toggleCheck('${checkId}', this.checked)">
                    <span class="tag-display">${charName}${kw.name}</span>
                `;
                tr.appendChild(td);
            });
            tableBody.appendChild(tr);
        });
        updateProgress();
    }

    // 수정 기능
    function editChar(idx, val) { state.chars[idx] = val; save(); render(); }
    function editKw(idx, field, val) { state.keywords[idx][field] = val; save(); render(); }
    function toggleCheck(id, val) { state.checks[id] = val; save(); }

    // 추가/삭제 기능
    function addColumn() { state.chars.push(`캐릭${state.chars.length + 1}`); save(); render(); }
    function addRow() { state.keywords.push({ name: 'new', desc: '설명 입력' }); save(); render(); }
    
    function removeColumn(idx) {
        if(confirm('이 캐릭터를 삭제할까요?')) {
            state.chars.splice(idx, 1);
            // 관련 체크 데이터 정리
            save(); render();
        }
    }
    function removeRow(idx) {
        if(confirm('이 키워드를 삭제할까요?')) {
            state.keywords.splice(idx, 1);
            save(); render();
        }
    }

    function updateProgress() {
        const total = state.chars.length * state.keywords.length;
        const checked = Object.values(state.checks).filter(v => v === true).length;
        const percent = total > 0 ? Math.round((checked / total) * 100) : 0;
        document.getElementById('progressBar').style.width = percent + '%';
        document.getElementById('percentText').innerText = percent + '%';
    }

    function resetAll() {
        if(confirm('모든 데이터가 삭제됩니다. 계속할까요?')) {
            localStorage.removeItem(STORAGE_KEY);
            location.reload();
        }
    }

    init();
</script>

</body>
</html>
