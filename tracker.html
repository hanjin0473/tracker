<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>캐릭터 작업 트래커 (버그 수정판)</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; background-color: #f0f2f5; color: #333; }
        .container { max-width: 1400px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; color: #1a73e8; border-bottom: 2px solid #e8f0fe; padding-bottom: 15px; display: flex; align-items: center; justify-content: space-between; }
        
        /* 설정 영역 */
        .settings { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; margin-bottom: 20px; padding: 15px; background: #f8f9fa; border-radius: 8px; border: 1px solid #eee; }
        .char-input { display: flex; flex-direction: column; gap: 5px; }
        .char-input label { font-size: 11px; color: #666; font-weight: bold; text-align: center; }
        .char-input input { width: 100%; padding: 6px; text-align: center; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }

        /* 요약 영역 */
        .summary { margin-bottom: 20px; padding: 15px; background: #e8f0fe; border-radius: 8px; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
        .progress-bar { flex-grow: 1; height: 12px; background: #dae0e5; border-radius: 6px; overflow: hidden; position: relative; min-width: 200px; }
        .progress-fill { height: 100%; background: #34a853; width: 0%; transition: width 0.3s; }
        .status-text { font-weight: bold; color: #1a73e8; min-width: 120px; }

        /* 테이블 영역 */
        .table-wrapper { overflow-x: auto; border: 1px solid #eee; border-radius: 8px; }
        table { border-collapse: collapse; width: 100%; min-width: 1000px; table-layout: fixed; }
        th, td { border: 1px solid #eee; padding: 10px; text-align: center; font-size: 13px; }
        th { background-color: #f8f9fa; position: sticky; top: 0; z-index: 10; }
        .keyword-col { width: 100px; font-weight: bold; background: #fffde7; position: sticky; left: 0; z-index: 5; }
        .desc-col { width: 180px; text-align: left; font-size: 11px; color: #666; }
        
        /* 체크박스 및 태그 */
        input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; margin-bottom: 4px; }
        .tag-display { font-size: 10px; color: #888; display: block; background: #f1f3f4; padding: 2px; border-radius: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        .reset-btn { padding: 6px 12px; background: #ff4d4f; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <h2>
        캐릭터 작업 트래커 
        <button class="reset-btn" onclick="resetAll()">초기화</button>
    </h2>

    <div class="settings" id="charSettings"></div>

    <div class="summary">
        <div class="status-text">진행도: <span id="doneCount">0</span> / <span id="totalCount">0</span> (<span id="totalPercent">0%</span>)</div>
        <div class="progress-bar"><div class="progress-fill" id="totalBar"></div></div>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr id="tableHeader">
                    <th class="keyword-col">키워드</th>
                    <th class="desc-col">설명</th>
                </tr>
            </thead>
            <tbody id="trackerBody"></tbody>
        </table>
    </div>
</div>

<script>
    const STORAGE_KEY = 'char_tracker_v2';
    const keywords = [
        { id: 'basic', name: 'basic', desc: '기본 상태' },
        { id: 'happy', name: 'happy', desc: '크게 웃음' },
        { id: 'smile', name: 'smile', desc: '옅은 미소' },
        { id: 'shy', name: 'shy', desc: '수줍음, 설렘' },
        { id: 'angry', name: 'angry', desc: '분노, 화남' },
        { id: 'annoyed', name: 'annoyed', desc: '짜증, 귀찮음' },
        { id: 'sad', name: 'sad', desc: '슬픔, 우울' },
        { id: 'teary', name: 'teary', desc: '울먹임' },
        { id: 'flustered', name: 'flustered', desc: '당황, 놀람' },
        { id: 'thinking', name: 'thinking', desc: '신중함, 고민' }
    ];
    const charCount = 12;

    let appState = {
        initials: Array(charCount).fill('').map((_, i) => `c${i+1}`),
        checks: {}
    };

    function init() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) appState = JSON.parse(saved);

        renderSettings();
        renderTable();
        updateDisplay();
    }

    function renderSettings() {
        const settingsDiv = document.getElementById('charSettings');
        settingsDiv.innerHTML = '';
        appState.initials.forEach((initial, i) => {
            const div = document.createElement('div');
            div.className = 'char-input';
            div.innerHTML = `
                <label>캐릭${i+1}</label>
                <input type="text" value="${initial}" oninput="updateInitial(${i}, this.value)">
            `;
            settingsDiv.appendChild(div);
        });
    }

    function renderTable() {
        const header = document.getElementById('tableHeader');
        const body = document.getElementById('trackerBody');
        
        // 헤더
        for(let i=0; i < charCount; i++) {
            const th = document.createElement('th');
            th.id = `h-char-${i}`;
            th.innerText = appState.initials[i] || `캐릭${i+1}`;
            header.appendChild(th);
        }

        // 본문
        keywords.forEach(kw => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td class="keyword-col">${kw.name}</td><td class="desc-col">${kw.desc}</td>`;
            
            for(let i=0; i < charCount; i++) {
                const td = document.createElement('td');
                const checkId = `${kw.id}-${i}`;
                const isChecked = appState.checks[checkId] ? 'checked' : '';
                
                td.innerHTML = `
                    <input type="checkbox" class="chk" data-id="${checkId}" ${isChecked} onchange="toggleCheck('${checkId}')">
                    <span class="tag-display" id="tag-${kw.id}-${i}">${appState.initials[i]}${kw.id}</span>
                `;
                tr.appendChild(td);
            }
            body.appendChild(tr);
        });
    }

    function updateInitial(index, value) {
        appState.initials[index] = value;
        // 헤더 텍스트 변경
        document.getElementById(`h-char-${index}`).innerText = value || `캐릭${index+1}`;
        // 각 셀의 태그 텍스트 변경
        keywords.forEach(kw => {
            const tagSpan = document.getElementById(`tag-${kw.id}-${index}`);
            if (tagSpan) tagSpan.innerText = `${value}${kw.id}`;
        });
        save();
    }

    function toggleCheck(id) {
        const chk = document.querySelector(`input[data-id="${id}"]`);
        appState.checks[id] = chk.checked;
        save();
        updateDisplay();
    }

    function updateDisplay() {
        const total = keywords.length * charCount;
        const checked = Object.values(appState.checks).filter(v => v === true).length;
        const percent = Math.round((checked / total) * 100);

        document.getElementById('totalCount').innerText = total;
        document.getElementById('doneCount').innerText = checked;
        document.getElementById('totalPercent').innerText = percent + '%';
        document.getElementById('totalBar').style.width = percent + '%';
    }

    function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(appState)); }

    function resetAll() {
        if(confirm('데이터를 모두 지울까요?')) {
            localStorage.removeItem(STORAGE_KEY);
            location.reload();
        }
    }

    init();
</script>

</body>
</html>
