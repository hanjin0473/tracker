<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>캐릭터 작업 트래커 (자동저장)</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; background-color: #f5f5f5; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2 { margin-top: 0; color: #1a73e8; border-bottom: 2px solid #e8f0fe; padding-bottom: 15px; }
        
        /* 설정 영역 */
        .settings { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; padding: 20px; background: #f8f9fa; border-radius: 8px; border: 1px solid #eee; }
        .char-input { display: flex; flex-direction: column; gap: 5px; }
        .char-input label { font-size: 11px; color: #666; font-weight: bold; }
        .char-input input { width: 70px; padding: 8px; text-align: center; border: 1px solid #ddd; border-radius: 4px; transition: border 0.2s; }
        .char-input input:focus { border-color: #1a73e8; outline: none; background: #fff; }

        /* 요약 영역 */
        .summary { margin-bottom: 25px; padding: 15px 20px; background: #e8f0fe; border-radius: 8px; display: flex; align-items: center; gap: 30px; }
        .summary-item { display: flex; flex-direction: column; }
        .summary-label { font-size: 13px; color: #5f6368; }
        .summary-value { font-size: 18px; font-weight: bold; color: #1a73e8; }
        .progress-container { flex-grow: 1; max-width: 300px; }
        .progress-bar { height: 12px; background: #dae0e5; border-radius: 6px; overflow: hidden; margin-top: 5px; }
        .progress-fill { height: 100%; background: #34a853; width: 0%; transition: width 0.4s ease; }

        /* 테이블 영역 */
        .table-wrapper { overflow-x: auto; border-radius: 8px; border: 1px solid #eee; }
        table { border-collapse: collapse; width: 100%; min-width: 900px; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: center; }
        th { background-color: #f8f9fa; font-size: 13px; font-weight: 600; position: sticky; top: 0; }
        .keyword-name { font-weight: bold; color: #202124; text-align: left; background: #fffde7; }
        .keyword-desc { font-size: 12px; color: #70757a; text-align: left; min-width: 150px; }
        
        /* 체크박스 및 태그 */
        .cell-content { display: flex; flex-direction: column; align-items: center; gap: 6px; }
        input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
        .tag-display { font-size: 10px; color: #9aa0a6; font-family: monospace; background: #f1f3f4; padding: 2px 4px; border-radius: 3px; word-break: break-all; }
        
        .reset-btn { margin-left: auto; padding: 8px 15px; background: #ea4335; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .reset-btn:hover { background: #d93025; }
    </style>
</head>
<body>

<div class="container">
    <h2>캐릭터 작업 트래커 <span style="font-size: 14px; font-weight: normal; color: #888;">(자동 저장 중...)</span></h2>

    <div class="settings" id="charSettings"></div>

    <div class="summary">
        <div class="summary-item">
            <span class="summary-label">완료/전체</span>
            <span class="summary-value"><span id="doneCount">0</span> / <span id="totalCount">0</span></span>
        </div>
        <div class="summary-item progress-container">
            <span class="summary-label">진행률: <span id="totalPercent">0%</span></span>
            <div class="progress-bar"><div class="progress-fill" id="totalBar"></div></div>
        </div>
        <button class="reset-btn" onclick="resetAll()">전체 데이터 초기화</button>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr id="tableHeader">
                    <th>키워드</th>
                    <th>설명</th>
                </tr>
            </thead>
            <tbody id="trackerBody"></tbody>
        </table>
    </div>
</div>

<script>
    const STORAGE_KEY = 'char_tracker_data';
    const keywords = [
        { id: 'basic', name: 'basic', desc: '기본 상태' },
        { id: 'happy', name: 'happy', desc: '크게 웃음' },
        { id: 'smile', name: 'smile', desc: '옅은 미소' },
        { id: 'shy', name: 'shy', desc: '수줍음, 설렘' },
        { id: 'angry', name: 'angry', desc: '분노, 화남' },
        { id: 'flustered', name: 'flustered', desc: '당황, 놀람' },
        { id: 'thinking', name: 'thinking', desc: '신중함, 고민' },
        { id: 'sad', name: 'sad', desc: '슬픔, 우울' },
        { id: 'teary', name: 'teary', desc: '울먹임' }
    ];
    const charCount = 10;

    // 저장될 데이터 구조
    let appState = {
        initials: Array(charCount).fill('').map((_, i) => `c${i+1}`),
        checks: {} // 예: { 'basic-0': true }
    };

    function init() {
        loadData();
        renderSettings();
        renderTable();
        updateDisplay();
    }

    // 데이터 불러오기
    function loadData() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            appState = JSON.parse(saved);
        }
    }

    // 데이터 저장하기
    function saveData() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(appState));
    }

    function renderSettings() {
        const settingsDiv = document.getElementById('charSettings');
        settingsDiv.innerHTML = '';
        appState.initials.forEach((initial, i) => {
            const div = document.createElement('div');
            div.className = 'char-input';
            div.innerHTML = `
                <label>캐릭${i+1}</label>
                <input type="text" value="${initial}" oninput="updateInitial(${i}, this.value)">
            `;
            settingsDiv.appendChild(div);
        });
    }

    function renderTable() {
        const header = document.getElementById('tableHeader');
        const body = document.getElementById('trackerBody');
        
        for(let i=0; i < charCount; i++) {
            const th = document.createElement('th');
            th.id = `header-char-${i}`;
            th.innerText = appState.initials[i] || `캐릭${i+1}`;
            header.appendChild(th);
        }

        keywords.forEach(kw => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td class="keyword-name">${kw.name}</td><td class="keyword-desc">${kw.desc}</td>`;
            
            for(let i=0; i < charCount; i++) {
                const td = document.createElement('td');
                const checkId = `${kw.id}-${i}`;
                const isChecked = appState.checks[checkId] ? 'checked' : '';
                
                td.innerHTML = `
                    <div class="cell-content">
                        <input type="checkbox" class="chk" data-id="${checkId}" ${isChecked} onchange="toggleCheck('${checkId}')">
                        <span class="tag-display" id="tag-${checkId}">${appState.initials[i]}${kw.id}</span>
                    </div>
                `;
                tr.appendChild(td);
            }
            body.appendChild(tr);
        });
    }

    function updateInitial(index, value) {
        appState.initials[index] = value;
        document.getElementById(`header-char-${index}`).innerText = value || `캐릭${index+1}`;
        
        keywords.forEach(kw => {
            const tagSpan = document.getElementById(`tag-${kw.id}-${index}`);
            if (tagSpan) tagSpan.innerText = `${value}${kw.id}`;
        });
        saveData(); // 실시간 저장
    }

    function toggleCheck(id) {
        const chk = document.querySelector(`input[data-id="${id}"]`);
        appState.checks[id] = chk.checked;
        saveData(); // 실시간 저장
        updateDisplay();
    }

    function updateDisplay() {
        const total = keywords.length * charCount;
        const checked = Object.values(appState.checks).filter(v => v === true).length;
        const percent = Math.round((checked / total) * 100);

        document.getElementById('totalCount').innerText = total;
        document.getElementById('doneCount').innerText = checked;
        document.getElementById('totalPercent').innerText = percent + '%';
        document.getElementById('totalBar').style.width = percent + '%';
    }

    function resetAll() {
        if(confirm('모든 입력 내용과 체크 상태를 초기화할까요?')) {
            localStorage.removeItem(STORAGE_KEY);
            location.reload();
        }
    }

    init();
</script>

</body>
</html>
