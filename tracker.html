<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>커스텀 캐릭터 트래커 (완성형)</title>
    <style>
        :root { --primary: #1a73e8; --bg: #f0f2f5; --white: #ffffff; }
        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; background-color: var(--bg); color: #333; margin: 0; }
        .container { max-width: 100%; margin: 0 auto; background: var(--white); padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e8f0fe; padding-bottom: 15px; margin-bottom: 20px; }
        h2 { margin: 0; color: var(--primary); }

        .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; background: #f8f9fa; padding: 15px; border-radius: 8px; align-items: center; }
        button { padding: 8px 14px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: bold; transition: 0.2s; }
        .btn-add { background: var(--primary); color: white; }
        .btn-add:hover { background: #1557b0; }
        .btn-reset { background: #ea4335; color: white; margin-left: auto; }

        .summary { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; background: #e8f0fe; padding: 12px 20px; border-radius: 8px; flex-grow: 1; max-width: 500px; }
        .progress-bar { flex-grow: 1; height: 10px; background: #dae0e5; border-radius: 5px; overflow: hidden; }
        .progress-fill { height: 100%; background: #34a853; width: 0%; transition: 0.3s; }

        .table-wrapper { overflow: auto; border: 1px solid #eee; border-radius: 8px; max-height: 75vh; }
        table { border-collapse: collapse; width: 100%; table-layout: fixed; }
        th, td { border: 1px solid #eee; padding: 12px 8px; text-align: center; min-width: 120px; position: relative; }
        th { background: #f8f9fa; position: sticky; top: 0; z-index: 10; border-bottom: 2px solid #ddd; }
        
        .sticky-col { position: sticky; left: 0; background: #fffde7 !important; z-index: 11; font-weight: bold; width: 140px; }
        .desc-col { width: 180px; text-align: left; font-size: 11px; color: #666; background: #fafafa !important; position: sticky; left: 140px; z-index: 11; }

        .input-edit { width: 90%; border: 1px solid transparent; background: transparent; text-align: center; padding: 6px; border-radius: 4px; font-weight: inherit; font-size: inherit; }
        .input-edit:hover { border-color: #ccc; background: #fff; }
        .input-edit:focus { border-color: var(--primary); background: #fff; outline: none; box-shadow: 0 0 0 2px rgba(26,115,232,0.2); }
        
        .del-btn { position: absolute; top: 2px; right: 2px; font-size: 12px; color: #ccc; cursor: pointer; border: none; background: none; opacity: 0; transition: 0.2s; }
        th:hover .del-btn, td:hover .del-btn { opacity: 1; }
        .del-btn:hover { color: #ff4d4f; }

        .tag-display { font-size: 10px; color: #888; display: block; background: #f1f3f4; padding: 4px; border-radius: 4px; margin-top: 6px; font-family: monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        input[type="checkbox"] { cursor: pointer; width: 20px; height: 20px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2>🎨 작업 트래커</h2>
        <div class="summary">
            <span style="font-size: 14px; font-weight: bold; white-space: nowrap;"><span id="percentText">0%</span> 완료</span>
            <div class="progress-bar"><div class="progress-fill" id="progressBar"></div></div>
            <span style="font-size: 12px; color: #666; white-space: nowrap;">(<span id="doneCount">0</span>/<span id="totalCount">0</span>)</span>
        </div>
    </header>

    <div class="controls">
        <button class="btn-add" onclick="addColumn()">+ 캐릭터 추가</button>
        <button class="btn-add" onclick="addRow()">+ 키워드 추가</button>
        <button class="btn-reset" onclick="resetAll()">초기화</button>
    </div>

    <div class="table-wrapper">
        <table id="mainTable">
            <thead>
                <tr id="headerRow"></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    const STORAGE_KEY = 'omni_tracker_v4_final';
    
    let state = {
        chars: ['캐릭1', '캐릭2', '캐릭3'],
        keywords: [
            { name: 'basic', desc: '기본 상태' },
            { name: 'happy', desc: '웃음, 밝은 음성' },
            { name: 'smile', desc: '옅은 미소' }
        ],
        checks: {}
    };

    function init() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) state = JSON.parse(saved);
        render();
    }

    function save() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        updateProgress();
    }

    function render() {
        const headerRow = document.getElementById('headerRow');
        const tableBody = document.getElementById('tableBody');

        // 1. 헤더 렌더링
        let headerHtml = `<th class="sticky-col">키워드</th><th class="desc-col">설명</th>`;
        state.chars.forEach((name, idx) => {
            headerHtml += `
                <th>
                    <input class="input-edit" value="${name}" onchange="editChar(${idx}, this.value)">
                    <button class="del-btn" onclick="removeColumn(${idx})">✖</button>
                </th>`;
        });
        headerRow.innerHTML = headerHtml;

        // 2. 본문 렌더링
        tableBody.innerHTML = '';
        state.keywords.forEach((kw, kwIdx) => {
            const tr = document.createElement('tr');
            
            let rowHtml = `
                <td class="sticky-col">
                    <input class="input-edit" value="${kw.name}" onchange="editKw(${kwIdx}, 'name', this.value)">
                    <button class="del-btn" onclick="removeRow(${kwIdx})">✖</button>
                </td>
                <td class="desc-col">
                    <input class="input-edit" style="text-align:left;" value="${kw.desc}" onchange="editKw(${kwIdx}, 'desc', this.value)">
                </td>
            `;

            state.chars.forEach((charName, charIdx) => {
                const checkId = `check-${kwIdx}-${charIdx}`;
                const isChecked = state.checks[checkId] ? 'checked' : '';
                // 이니셜과 키워드를 결합한 태그 생성
                const tag = `${charName}${kw.name}`;
                
                rowHtml += `
                    <td>
                        <input type="checkbox" ${isChecked} onchange="toggleCheck('${checkId}', this.checked)">
                        <span class="tag-display" title="${tag}">${tag}</span>
                    </td>`;
            });
            tr.innerHTML = rowHtml;
            tableBody.appendChild(tr);
        });
        updateProgress();
    }

    function editChar(idx, val) {
        state.chars[idx] = val.trim() || `캐릭${idx+1}`;
        save();
        render(); // 이름을 바꾸면 태그들도 바뀌어야 하므로 다시 렌더링
    }

    function editKw(idx, field, val) {
        state.keywords[idx][field] = val.trim();
        save();
        render(); // 키워드를 바꾸면 태그들도 바뀌어야 하므로 다시 렌더링
    }

    function toggleCheck(id, val) {
        state.checks[id] = val;
        save();
    }

    function addColumn() {
        state.chars.push(`캐릭${state.chars.length + 1}`);
        save();
        render();
    }

    function addRow() {
        state.keywords.push({ name: 'new', desc: '설명 입력' });
        save();
        render();
    }
    
    function removeColumn(idx) {
        if(confirm('이 캐릭터를 삭제할까요?')) {
            state.chars.splice(idx, 1);
            // 삭제된 열의 체크 데이터는 자연스럽게 렌더링에서 제외됨
            save(); render();
        }
    }

    function removeRow(idx) {
        if(confirm('이 키워드를 삭제할까요?')) {
            state.keywords.splice(idx, 1);
            save(); render();
        }
    }

    function updateProgress() {
        const total = state.chars.length * state.keywords.length;
        const checked = Object.values(state.checks).filter(v => v === true).length;
        const percent = total > 0 ? Math.round((checked / total) * 100) : 0;
        
        document.getElementById('progressBar').style.width = percent + '%';
        document.getElementById('percentText').innerText = percent + '%';
        document.getElementById('doneCount').innerText = checked;
        document.getElementById('totalCount').innerText = total;
    }

    function resetAll() {
        if(confirm('모든 데이터가 초기화됩니다. 계속할까요?')) {
            localStorage.removeItem(STORAGE_KEY);
            location.reload();
        }
    }

    init();
</script>

</body>
</html>
